services:
  - type: web
    name: baccarat-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "bash backend/scripts/render_start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: baccarat-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: baccarat-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://baccarat-backend.onrender.com/api"
      - key: VITE_WS_URL
        value: "wss://baccarat-backend.onrender.com/ws"

databases:
  - name: baccarat-db
    plan: free
    postgresMajorVersion: 15
