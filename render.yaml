services:
  - type: web
    name: baccarat-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: baccarat-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: baccarat-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://baccarat-backend.onrender.com/api"
      - key: VITE_WS_URL
        value: "wss://baccarat-backend.onrender.com/ws"

databases:
  - name: baccarat-db
    plan: free
    postgresMajorVersion: 15
