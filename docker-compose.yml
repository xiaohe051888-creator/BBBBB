# ============================================
# Baccarat Analysis System - Docker Compose
# ============================================
# Usage:
#   Dev mode:   docker compose up --build
#   Prod mode:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Stop:       docker compose down
#   Logs:       docker compose logs -f
# ============================================

services:
  baccarat-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baccarat-app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # --- Debug ---
      - DEBUG=${DEBUG:-false}
      
      # --- Security (Must change in production!) ---
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      
      # --- Admin ---
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-8888}
      
      # --- AI API (Three Models) ---
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-}
      
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - ANTHROPIC_API_BASE=${ANTHROPIC_API_BASE:-}
      
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - GEMINI_API_BASE=${GEMINI_API_BASE:-}

      - OFOX_API_BASE=${OFOX_API_BASE:-}
      - OFOX_API_KEY=${OFOX_API_KEY:-}
      
    volumes:
      # Data persistence (Database + Logs)
      - baccarat-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  baccarat-data:
    driver: local
